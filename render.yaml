services:
  - type: web
    name: nazeers-zaffran-house
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_USERNAME
        value: zaffranhouse
      - key: ADMIN_EMAIL
        value: admin@zaffranhouse.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
